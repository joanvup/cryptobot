<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>AI Quant Terminal v4.4 - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-dark: #0b101a;
            --card-bg: #151b27;
            --border: #222b3a;
        }

        body {
            background-color: var(--bg-dark);
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .card-quant {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .log-terminal {
            background: #010409;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            height: 350px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .progress-container {
            background: #1c2431;
            height: 8px;
            border-radius: 4px;
            position: relative;
            overflow: visible;
            width: 100%;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
        }

        .marker {
            position: absolute;
            top: -3px;
            width: 3px;
            height: 14px;
            border-radius: 1px;
            z-index: 20;
            transform: translateX(-50%);
        }

        .marker-be {
            background-color: #fbbf24;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
        }

        .marker-ts1 {
            background-color: #f97316;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.8);
        }

        .marker-ts2 {
            background-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [data, setData] = useState({ trades: [], logs: [], balance: { wallet_balance: 0, total_balance: 0, unrealized_pnl: 0 }, radar: [] });
            const [settings, setSettings] = useState({ max_trades: 0, be_r: 1, ts1_r: 1.5, ts2_r: 2.0, tp_r: 3 });
            const [currentPage, setCurrentPage] = useState(1);
            const tradesPerPage = 10;

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const fUSD = (val, dec = 2) => {
                const n = parseFloat(val);
                if (isNaN(n)) return "0.00";
                return new Intl.NumberFormat('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n);
            };

            const fPrice = (val) => {
                const n = parseFloat(val);
                if (isNaN(n)) return "0.00";
                const dec = n < 1.0 ? 6 : 4;
                return new Intl.NumberFormat('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n);
            };

            const fetchData = async () => {
                try {
                    const [resB, resT, resL, resR, resS] = await Promise.all([
                        fetch('/balance').then(r => r.json()),
                        fetch('/api/trades').then(r => r.json()),
                        fetch('/api/logs').then(r => r.json()),
                        fetch('/api/radar').then(r => r.json()),
                        fetch('/api/bot-settings').then(r => r.json())
                    ]);
                    setData({
                        balance: resB.wallet_balance !== undefined ? resB : data.balance,
                        trades: resT.trades || [],
                        logs: resL.logs || [],
                        radar: resR.radar || []
                    });
                    setSettings(resS);
                } catch (e) { console.error("Sync Error:", e); }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 5000);
                return () => clearInterval(interval);
            }, []);

            // --- LÓGICA DE LA GRÁFICA SIN PARPADEO ---
            useEffect(() => {
                if (chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    let currentEq = data.balance.wallet_balance;
                    const closed = [...data.trades].filter(t => !t.is_open).reverse();
                    const points = closed.length > 0 ? closed.map(t => { currentEq += (t.pnl || 0); return currentEq; }) : [data.balance.wallet_balance, data.balance.wallet_balance];
                    const labels = points.map((_, i) => i);

                    if (chartInstance.current) {
                        chartInstance.current.data.labels = labels;
                        chartInstance.current.data.datasets[0].data = points;
                        chartInstance.current.update('none');
                    } else {
                        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                        gradient.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
                        gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
                        chartInstance.current = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: labels,
                                datasets: [{ data: points, borderColor: '#3b82f6', borderWidth: 3, backgroundColor: gradient, fill: true, tension: 0.4, pointRadius: 0 }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4b5563', font: { size: 10 } } } } }
                        });
                    }
                }
            }, [data.trades, data.balance.wallet_balance]);

            // --- LÓGICA DE TELEMETRÍA MULTI-FASE DIRECCIONAL ---
            const activeTradesMapped = data.trades.filter(t => t.is_open).map(trade => {
                const radarInfo = data.radar.find(r => r.symbol === trade.symbol);
                const currentPrice = radarInfo ? radarInfo.price : trade.entry_price;
                const multiplier = trade.side === 'LONG' ? 1 : -1;

                const pnl = (currentPrice - trade.entry_price) * trade.position_size * multiplier;
                const roe = ((currentPrice / trade.entry_price) - 1) * 100 * multiplier;
                const risk_usdt = Math.abs(trade.entry_price - trade.initial_stop_loss) * trade.position_size;
                const current_r = risk_usdt > 0 ? (pnl / risk_usdt) : 0;

                const meta_be_price = trade.side === 'LONG' ? trade.entry_price + (trade.atr_at_entry * settings.be_r) : trade.entry_price - (trade.atr_at_entry * settings.be_r);
                const meta_ts1_price = trade.side === 'LONG' ? trade.entry_price + (trade.atr_at_entry * settings.ts1_r) : trade.entry_price - (trade.atr_at_entry * settings.ts1_r);
                const meta_ts2_price = trade.side === 'LONG' ? trade.entry_price + (trade.atr_at_entry * settings.ts2_r) : trade.entry_price - (trade.atr_at_entry * settings.ts2_r);

                let progress, be_pos, ts1_pos, ts2_pos;

                if (trade.side === 'LONG') {
                    const range = trade.take_profit - trade.initial_stop_loss;
                    const getL = (p) => Math.min(Math.max(((p - trade.initial_stop_loss) / range) * 100, 0), 100);
                    progress = getL(currentPrice);
                    be_pos = getL(meta_be_price);
                    ts1_pos = getL(meta_ts1_price);
                    ts2_pos = getL(meta_ts2_price);
                } else {
                    const range = trade.initial_stop_loss - trade.take_profit;
                    const getR = (p) => Math.min(Math.max(((trade.initial_stop_loss - p) / range) * 100, 0), 100);
                    progress = getR(currentPrice);
                    be_pos = getR(meta_be_price);
                    ts1_pos = getR(meta_ts1_price);
                    ts2_pos = getR(meta_ts2_price);
                }

                return { ...trade, currentPrice, pnl, roe, current_r, progress, be_pos, ts1_pos, ts2_pos, meta_be: meta_be_price, meta_ts1: meta_ts1_price, meta_ts2: meta_ts2_price };
            });

            const closedTrades = data.trades.filter(t => !t.is_open);
            const totalPages = Math.ceil(closedTrades.length / tradesPerPage);
            const paginatedTrades = closedTrades.slice((currentPage - 1) * tradesPerPage, currentPage * tradesPerPage);

            return (
                <div className="max-w-[1600px] mx-auto p-6 space-y-6">
                    {/* HEADER */}
                    <div className="flex justify-between items-center border-b border-gray-800 pb-6">
                        <div className="flex items-center gap-4">
                            <div className="p-2 bg-blue-600/20 rounded-lg border border-blue-500/30">
                                <i className="fas fa-microchip text-blue-500 text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-white tracking-tight italic">
                                    AI Quant Terminal
                                    {settings.run_mode === 'DRY_RUN' && <span className="text-[10px] bg-yellow-500/20 text-yellow-400 px-2 py-0.5 rounded border border-yellow-500/30 ml-2 font-bold not-italic uppercase shadow-[0_0_8px_rgba(234,179,8,0.4)]">🟡 DRY RUN</span>}
                                    {settings.run_mode === 'MAINNET' && <span className="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded border border-green-500/30 ml-2 font-bold not-italic uppercase shadow-[0_0_8px_rgba(34,197,94,0.4)]">🟢 MAINNET</span>}
                                    {settings.run_mode === 'TESTNET' && <span className="text-[10px] bg-purple-500/20 text-purple-400 px-2 py-0.5 rounded border border-purple-500/30 ml-2 font-bold not-italic uppercase">🧪 TESTNET</span>}
                                </h1>
                                <p className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">
                                    {new Date().toLocaleTimeString()} <span className="text-green-500 ml-2 font-bold animate-pulse">● SYSTEM ONLINE</span>
                                </p>
                            </div>
                        </div>

                        <div className="flex gap-4">
                            <div className="card-quant px-6 py-2 text-center bg-[#1c2431]/40 border-l-2 border-l-yellow-500">
                                <p className="text-[9px] text-gray-400 uppercase font-bold mb-1 italic tracking-widest">ESTRATEGIA (ATR)</p>
                                <p className="text-xs font-bold mono">
                                    BE: <span className="text-yellow-500">{settings.be_r}x</span> |
                                    TS1: <span className="text-orange-500">{settings.ts1_r}x</span> |
                                    TS2: <span className="text-red-500">{settings.ts2_r}x</span>
                                </p>
                            </div>
                            <div className="card-quant px-8 py-2 text-center border-l-2 border-l-blue-500 bg-gradient-to-r from-blue-500/10 to-transparent">
                                <p className="text-[9px] text-gray-500 uppercase font-bold mb-1 tracking-widest text-blue-400">BALANCE USDT</p>
                                <p className="text-xl font-bold mono text-white tracking-tighter">${fUSD(data.balance.wallet_balance)}</p>
                            </div>
                            <div className="card-quant px-8 py-2 text-center border-l-2 border-l-purple-500 font-bold bg-[#1c2431]/30">
                                <p className="text-[9px] text-gray-500 uppercase mb-1 tracking-widest">OPERACIONES</p>
                                <p className="text-xl mono">{activeTradesMapped.length} <span className="text-gray-600 text-sm">/ {settings.max_trades}</span></p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 space-y-6">

                            {/* GRÁFICA */}
                            <div className="card-quant p-6 h-64 relative">
                                <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                                    <i className="fas fa-chart-area text-blue-500"></i> Equity Performance
                                </h3>
                                <div className="h-40 w-full"><canvas ref={chartRef}></canvas></div>
                            </div>

                            {/* ACTIVE POSITIONS - 2 COLUMNAS */}
                            <div className="space-y-4">
                                <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] flex items-center gap-2">
                                    <i className="fas fa-satellite text-green-500"></i> Active Portfolio
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {activeTradesMapped.map(trade => (
                                        <div key={trade.id} className={`card-quant p-5 border-l-4 ${trade.side === 'LONG' ? 'border-l-green-500 bg-gradient-to-br from-green-500/5 to-transparent' : 'border-l-red-500 bg-gradient-to-br from-red-500/5 to-transparent'}`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="flex items-center gap-3">
                                                    <span className={`text-[10px] font-black px-2 py-0.5 rounded italic uppercase text-white ${trade.side === 'LONG' ? 'bg-green-500' : 'bg-red-500'}`}>
                                                        {trade.side}
                                                    </span>
                                                    <span className="text-xl font-bold text-white tracking-tighter">{trade.symbol}</span>
                                                    {trade.trailing_phase > 0 && (
                                                        <span className="text-[9px] bg-blue-600/30 text-blue-400 border border-blue-500/50 px-1.5 py-0.5 rounded font-bold mono uppercase">Fase {trade.trailing_phase}</span>
                                                    )}
                                                </div>
                                                <div className="flex flex-col items-end">
                                                    <p className={`text-xl font-bold mono leading-none mb-1 ${trade.pnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                        {trade.pnl >= 0 ? '+' : ''}{fUSD(trade.pnl)} <span className="text-sm font-normal text-gray-400">USDT</span>
                                                        <span className={`text-[10px] font-bold ml-1 ${trade.roe >= 0 ? 'text-green-500/60' : 'text-red-500/60'}`}>({trade.roe?.toFixed(2)}%)</span>
                                                    </p>
                                                    <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded text-[10px] font-bold mono ${trade.current_r >= 0 ? 'bg-blue-500/20 text-blue-300' : 'bg-red-500/20 text-red-300'}`}>
                                                        <i className="fas fa-chart-line"></i> {trade.current_r >= 0 ? '+' : ''}{trade.current_r.toFixed(2)} R
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-4 gap-2 text-left mb-6">
                                                <div><p className="text-[9px] text-gray-500 uppercase mb-1 tracking-wider font-bold">Precio Actual</p><p className="text-base font-bold mono text-white">${fPrice(trade.currentPrice)}</p></div>
                                                <div><p className="text-[10px] text-gray-500 uppercase mb-1 tracking-wider">Precio Entrada</p><p className="text-base font-bold mono text-gray-400">${fPrice(trade.entry_price)}</p></div>
                                                <div><p className="text-[10px] text-red-500/70 uppercase mb-1 font-bold tracking-wider">Stop Loss</p><p className="text-base font-bold mono text-red-400">${fPrice(trade.current_stop_loss)}</p></div>
                                                <div><p className="text-[10px] text-green-500/70 uppercase mb-1 font-bold tracking-wider">Take Profit</p><p className="text-base font-bold mono text-green-400">${fPrice(trade.take_profit)}</p></div>
                                            </div>

                                            <div className="bg-[#0d1117] p-4 rounded-lg border border-gray-800/50 relative">
                                                <div className="flex justify-between text-[11px] text-gray-400 mono mb-3">
                                                    <span>Meta BE ({settings.be_r}x): <span className="text-white font-bold">${fPrice(trade.meta_be)}</span></span>
                                                    <span>Meta TS ({settings.ts1_r}x): <span className="text-white font-bold">${fPrice(trade.meta_ts1)}</span></span>
                                                </div>
                                                <div className="progress-container bg-[#1c2431]">
                                                    <div className="marker marker-be" style={trade.side === 'LONG' ? { left: `${trade.be_pos}%` } : { right: `${trade.be_pos}%`, left: 'auto' }}></div>
                                                    <div className="marker marker-ts1" style={trade.side === 'LONG' ? { left: `${trade.ts1_pos}%` } : { right: `${trade.ts1_pos}%`, left: 'auto' }}></div>
                                                    <div className="marker marker-ts2" style={trade.side === 'LONG' ? { left: `${trade.ts2_pos}%` } : { right: `${trade.ts2_pos}%`, left: 'auto' }}></div>
                                                    <div className="progress-fill bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.6)]"
                                                        style={trade.side === 'LONG' ? { left: 0, width: `${trade.progress}%` } : { right: 0, width: `${trade.progress}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {activeTradesMapped.length === 0 && <div className="col-span-full py-10 text-center text-gray-600 text-xs italic border-2 border-dashed border-gray-800/50 rounded-xl">No active positions.</div>}
                                </div>
                            </div>

                            {/* HISTORY */}
                            <div className="space-y-4">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] flex items-center gap-2 text-blue-400">
                                        <i className="fas fa-history"></i> Closed Trades History
                                    </h3>
                                    <div className="flex gap-2 items-center text-[10px] uppercase font-bold mono">
                                        <button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} className="px-2 py-1 bg-gray-800 rounded hover:bg-gray-700 disabled:opacity-50 transition" disabled={currentPage === 1}><i className="fas fa-chevron-left"></i></button>
                                        <span className="text-gray-400">Page {currentPage} of {totalPages || 1}</span>
                                        <button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} className="px-2 py-1 bg-gray-800 rounded hover:bg-gray-700 disabled:opacity-50 transition" disabled={currentPage === totalPages || totalPages === 0}><i className="fas fa-chevron-right"></i></button>
                                    </div>
                                </div>
                                <div className="card-quant overflow-hidden">
                                    <table className="w-full text-left text-[11px]">
                                        <thead>
                                            <tr className="bg-gray-900/50 text-gray-500 uppercase text-[9px] border-b border-gray-800 font-bold tracking-widest">
                                                <th className="p-4">Time</th><th className="p-4">Asset</th><th className="p-4">Side</th><th className="p-4">Entry</th><th className="p-4">Exit</th><th className="p-4 text-right">PNL USDT</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-800 font-medium">
                                            {paginatedTrades.map(t => (
                                                <tr key={t.id} className="hover:bg-gray-800/30 transition">
                                                    <td className="p-4 text-gray-500">{new Date(t.entry_time).toLocaleDateString()} {new Date(t.entry_time).toLocaleTimeString()}</td>
                                                    <td className="p-4 font-bold text-gray-200">{t.symbol}</td>
                                                    <td className={`p-4 font-bold ${t.side === 'LONG' ? 'text-green-500' : 'text-red-500'}`}>{t.side}</td>
                                                    <td className="p-4 mono text-gray-400">${fPrice(t.entry_price)}</td>
                                                    <td className="p-4 mono text-gray-400">${fPrice(t.exit_price)}</td>
                                                    <td className={`p-4 mono font-bold text-right ${t.pnl >= 0 ? 'text-green-400' : 'text-red-400'}`}>{t.pnl >= 0 ? '+' : ''}{fUSD(t.pnl)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* COLUMNA DERECHA: RADAR + LOGS */}
                        <div className="space-y-6">
                            <div className="card-quant p-6 bg-[#0d121c]">
                                <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-6 flex justify-between items-center">
                                    <span><i className="fas fa-satellite-dish text-blue-400 mr-2"></i> Radar IA Monitor</span>
                                    <span className="text-[8px] bg-blue-500/10 text-blue-400 border border-blue-500/20 uppercase font-bold tracking-widest italic tracking-widest">Live</span>
                                </h3>
                                <div className="space-y-4">
                                    {data.radar.map(item => (
                                        <div key={item.symbol} className="p-4 rounded-xl bg-gray-900/40 border border-gray-800/50 hover:border-gray-700 transition-all shadow-inner">
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-sm font-bold text-gray-200 tracking-tight">{item.symbol}</span>
                                                <span className={`text-[9px] font-black px-2 py-1 rounded uppercase tracking-wider ${item.signal === 'LONG' ? 'bg-green-500/10 text-green-400' : item.signal === 'SHORT' ? 'bg-red-500/10 text-red-400' : 'bg-gray-800 text-gray-500'}`}>{item.signal}</span>
                                            </div>

                                            {/* PRECIO, TENDENCIA Y FUNDING */}
                                            <div className="flex justify-between items-center mb-3 border-b border-gray-800/30 pb-3">
                                                <div className="flex flex-col">
                                                    <span className="text-2xl font-bold mono text-white tracking-tighter">${fPrice(item.price)}</span>
                                                    <span className={`text-[10px] font-bold uppercase ${item.indicators?.trend === 'UP' ? 'text-green-500/80' : 'text-red-500/80'}`}>
                                                        {item.indicators?.trend === 'UP' ? '▲ Bullish' : '▼ Bearish'}
                                                    </span>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-[9px] text-gray-500 uppercase block tracking-widest font-bold">Funding</span>
                                                    <span className={`text-[10px] font-bold mono ${Math.abs(item.indicators?.funding) > 0.03 ? 'text-red-500' : Math.abs(item.indicators?.funding) > 0.01 ? 'text-yellow-500' : 'text-gray-400'}`}>
                                                        <i className="far fa-clock mr-1 text-[8px]"></i>
                                                        {(item.indicators?.funding * 100).toFixed(4)}%
                                                    </span>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3 mb-3">
                                                <div className="bg-black/40 p-2 rounded-lg text-center border border-gray-800/30">
                                                    <p className="text-[8px] text-gray-500 uppercase font-bold tracking-widest mb-1">RSI (14)</p>
                                                    <p className={`text-base font-bold mono ${item.indicators?.rsi > 50 ? 'text-green-400' : 'text-red-400'}`}>{item.indicators?.rsi?.toFixed(1)}</p>
                                                </div>
                                                <div className="bg-black/40 p-2 rounded-lg text-center border border-gray-800/30">
                                                    <p className="text-[8px] text-gray-500 uppercase font-bold tracking-widest mb-1">Vol Rel</p>
                                                    <p className={`text-base font-bold mono ${item.indicators?.rel_vol > 1.2 ? 'text-blue-400' : 'text-gray-500'}`}>{item.indicators?.rel_vol?.toFixed(2)}x</p>
                                                </div>
                                            </div>

                                            <div className="bg-black/30 p-3 rounded-lg border border-gray-800/30 mt-3 space-y-2">
                                                <div className="flex justify-between items-end">
                                                    <span className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">IA Confidence</span>
                                                    <span className={`text-xl font-bold mono leading-none ${item.signal !== 'NEUTRAL' ? 'text-blue-400' : 'text-gray-500'}`}>
                                                        {item.signal === 'NEUTRAL' ? '--' : item.confidence.toFixed(1) + '%'}
                                                    </span>
                                                </div>
                                                <div className="w-full h-2 bg-gray-800 rounded-full overflow-hidden">
                                                    <div className={`h-full transition-all duration-700 ${item.signal === 'LONG' ? 'bg-green-500 shadow-[0_0_10px_#10b981]' : item.signal === 'SHORT' ? 'bg-red-500 shadow-[0_0_10px_#ef4444]' : 'bg-gray-600'}`} style={{ width: `${item.confidence}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="card-quant overflow-hidden flex flex-col h-[350px]">
                                <div className="p-3 border-b border-gray-800 bg-gray-900/50 text-[9px] font-bold uppercase tracking-widest text-gray-500 italic"><i className="fas fa-terminal mr-2"></i> System Logs</div>
                                <div className="log-terminal p-4">
                                    {data.logs.map(log => (
                                        <div key={log.id} className="mb-2 border-b border-gray-800/30 pb-2 italic text-[10px]">
                                            <div className="flex justify-between items-center mb-1 text-[9px]">
                                                <span className="text-gray-600 font-bold">[{new Date(log.timestamp).toLocaleTimeString()}]</span>
                                                <span className={`font-black uppercase ${log.level === 'ERROR' ? 'text-red-500' : 'text-green-500'}`}>{log.level}</span>
                                            </div>
                                            <div className="text-gray-400 leading-tight">{log.message}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
